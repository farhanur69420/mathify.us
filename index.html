<style>
/* ─── THEME TOKENS ─── */
[data-theme="light"] {
  --ink: #0d0d0d;
  --paper: #f5f0e8;
  --paper2: #ffffff;
  --steel: #2c3e50;
  --rust: #c0392b;
  --blueprint: #1a3a5c;
  --grid: #d4cfc4;
  --accent: #e67e22;
  --nav-bg: rgba(245,240,232,0.93);
  --card-bg: #ffffff;
  --card-border: #d4cfc4;
  --toggle-bg: #1a3a5c;
  --toggle-icon: #f5f0e8;
  --chat-user: #e8f0fe;
  --chat-bot: #ffffff;
  --chat-bot-border: #d4cfc4;
  --text-muted: #666;
  --search-bg: rgba(255,255,255,0.9);
  --search-border: #c4bfb4;
  --search-result-hover: #f0ebe3;
  --search-shadow: 0 8px 32px rgba(0,0,0,0.12);
  --kbd-bg: #e8e3db;
  --kbd-border: #c4bfb4;
}
[data-theme="dark"] {
  --ink: #e2e8f0;
  --paper: #0d1117;
  --paper2: #161b22;
  --steel: #94a3b8;
  --rust: #f87171;
  --blueprint: #60a5fa;
  --grid: #1e293b;
  --accent: #f59e0b;
  --nav-bg: rgba(13,17,23,0.93);
  --card-bg: #161b22;
  --card-border: #1e293b;
  --toggle-bg: #f59e0b;
  --toggle-icon: #0d1117;
  --chat-user: #1e293b;
  --chat-bot: #161b22;
  --chat-bot-border: #1e293b;
  --text-muted: #64748b;
  --search-bg: rgba(22,27,34,0.98);
  --search-border: #2d3748;
  --search-result-hover: #1e293b;
  --search-shadow: 0 8px 32px rgba(0,0,0,0.5);
  --kbd-bg: #1e293b;
  --kbd-border: #334155;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(–paper);color:var(–ink);font-family:‘DM Sans’,sans-serif;overflow-x:hidden;transition:background 0.3s,color 0.3s;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:’’;position:fixed;inset:0;background-image:linear-gradient(rgba(26,58,92,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,58,92,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
[data-theme=“dark”] body::before{background-image:linear-gradient(rgba(96,165,250,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.04) 1px,transparent 1px);}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:0.85rem 2.5rem;background:var(–nav-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(–grid);transition:background 0.3s;gap:1rem;}
.nav-logo{font-family:‘Space Mono’,monospace;font-size:0.85rem;letter-spacing:0.1em;color:var(–blueprint);text-transform:uppercase;text-decoration:none;flex-shrink:0;}
.nav-center{flex:1;max-width:420px;position:relative;}
.nav-right{display:flex;align-items:center;gap:0.6rem;flex-shrink:0;}
.theme-toggle{width:36px;height:36px;border-radius:50%;background:var(–toggle-bg);border:none;color:var(–toggle-icon);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background 0.3s,transform 0.2s;}
.theme-toggle:hover{transform:rotate(20deg) scale(1.1);}
.nav-links{display:flex;gap:1.2rem;list-style:none;align-items:center;}
.nav-links a{font-family:‘Space Mono’,monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(–steel);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(–rust);}

/* ─── SEARCH BAR ─── */
.search-bar-wrap{position:relative;width:100%;}
.search-input-row{display:flex;align-items:center;gap:0;background:var(–search-bg);border:1.5px solid var(–search-border);border-radius:8px;overflow:hidden;transition:border-color 0.2s, box-shadow 0.2s;}
.search-input-row:focus-within{border-color:var(–blueprint);box-shadow:0 0 0 3px rgba(96,165,250,0.12);}
[data-theme=“light”] .search-input-row:focus-within{box-shadow:0 0 0 3px rgba(26,58,92,0.1);}
.search-icon{padding:0 0.6rem 0 0.75rem;color:var(–steel);font-size:0.9rem;flex-shrink:0;pointer-events:none;display:flex;align-items:center;}
.search-input{flex:1;border:none;background:transparent;color:var(–ink);font-family:‘DM Sans’,sans-serif;font-size:0.85rem;padding:0.55rem 0.4rem;outline:none;}
.search-input::placeholder{color:var(–text-muted);}
.search-kbd{display:flex;align-items:center;gap:3px;padding:0 0.6rem;flex-shrink:0;}
.search-kbd kbd{font-family:‘Space Mono’,monospace;font-size:0.58rem;padding:2px 5px;background:var(–kbd-bg);border:1px solid var(–kbd-border);border-radius:3px;color:var(–text-muted);}
.search-clear{background:none;border:none;cursor:pointer;color:var(–text-muted);padding:0 0.5rem;font-size:1rem;display:none;align-items:center;line-height:1;}
.search-clear.visible{display:flex;}
.search-clear:hover{color:var(–rust);}

/* ─── SEARCH DROPDOWN ─── */
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(–search-bg);border:1.5px solid var(–search-border);border-radius:10px;box-shadow:var(–search-shadow);overflow:hidden;z-index:200;max-height:420px;overflow-y:auto;display:none;backdrop-filter:blur(12px);}
.search-dropdown.open{display:block;animation:dropIn 0.18s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.search-section-label{font-family:‘Space Mono’,monospace;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:var(–text-muted);padding:0.6rem 1rem 0.3rem;border-top:1px solid var(–search-border);}
.search-section-label:first-child{border-top:none;}
.search-result{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1rem;cursor:pointer;text-decoration:none;color:var(–ink);transition:background 0.15s;}
.search-result:hover,.search-result.active{background:var(–search-result-hover);}
.search-result-icon{font-size:1.1rem;flex-shrink:0;width:28px;text-align:center;}
.search-result-content{flex:1;min-width:0;}
.search-result-title{font-size:0.88rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.search-result-meta{font-family:‘Space Mono’,monospace;font-size:0.62rem;color:var(–text-muted);margin-top:1px;}
.search-result-tag{font-family:‘Space Mono’,monospace;font-size:0.58rem;padding:2px 6px;border-radius:3px;flex-shrink:0;text-transform:uppercase;font-weight:700;}
.tag-math{background:rgba(96,165,250,0.15);color:var(–blueprint);}
.tag-physics{background:rgba(248,113,113,0.15);color:var(–rust);}
.tag-civil{background:rgba(245,158,11,0.15);color:var(–accent);}
.tag-page{background:rgba(148,163,184,0.15);color:var(–steel);}
.search-empty{padding:1.5rem 1rem;text-align:center;color:var(–text-muted);font-size:0.85rem;}
.search-empty span{display:block;font-size:1.5rem;margin-bottom:0.4rem;}

/* ─── SEARCH OVERLAY (mobile) ─── */
.search-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;backdrop-filter:blur(4px);}
.search-overlay.open{display:block;}

/* ─── CHAT CONTAINER ─── */
.chat-wrapper{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:5.5rem 1.5rem 2rem;position:relative;z-index:1;}
.chat-messages{flex:1;display:flex;flex-direction:column;gap:1.2rem;padding-bottom:2rem;}

/* ─── CHAT BUBBLES ─── */
.msg{display:flex;gap:0.8rem;align-items:flex-start;animation:fadeUp 0.4s ease forwards;opacity:0;}
.msg.bot{flex-direction:row;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.msg.bot .msg-avatar{background:var(–blueprint);color:#fff;}
.msg.user .msg-avatar{background:var(–accent);color:#fff;}
.msg-body{max-width:85%;padding:1rem 1.3rem;border-radius:16px;line-height:1.7;font-size:0.95rem;}
.msg.bot .msg-body{background:var(–chat-bot);border:1px solid var(–chat-bot-border);border-top-left-radius:4px;color:var(–ink);}
.msg.user .msg-body{background:var(–blueprint);color:#fff;border-top-right-radius:4px;}

/* ─── OPTION CARDS ─── */
.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:0.5rem;animation:fadeUp 0.5s ease forwards;opacity:0;animation-delay:0.2s;}
.opt-card{position:relative;display:flex;flex-direction:column;padding:1.8rem;border:2px solid var(–card-border);border-radius:12px;background:var(–card-bg);cursor:pointer;transition:all 0.25s;text-decoration:none;color:var(–ink);overflow:hidden;}
.opt-card:hover{border-color:var(–blueprint);transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12);}
[data-theme=“dark”] .opt-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.opt-icon{font-size:2.2rem;margin-bottom:0.8rem;}
.opt-title{font-family:‘Playfair Display’,serif;font-size:1.3rem;font-weight:700;color:var(–blueprint);margin-bottom:0.4rem;}
.opt-desc{font-size:0.85rem;color:var(–text-muted);line-height:1.6;}
.opt-badge{position:absolute;top:12px;right:12px;font-family:‘Space Mono’,monospace;font-size:0.55rem;letter-spacing:0.1em;padding:2px 8px;border-radius:3px;text-transform:uppercase;font-weight:700;}
.opt-badge.live{background:#16a34a;color:#fff;}
.opt-badge.soon{background:var(–accent);color:#fff;}
.opt-badge.new{background:var(–rust);color:#fff;}

/* ─── TYPING INDICATOR ─── */
.typing{display:flex;gap:4px;padding:0.8rem 1.2rem;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(–steel);animation:typingBounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

/* ─── FOOTER ─── */
footer{position:relative;z-index:1;padding:1.5rem 2.5rem;border-top:1px solid var(–grid);display:flex;justify-content:space-between;align-items:center;font-family:‘Space Mono’,monospace;font-size:0.68rem;letter-spacing:0.05em;color:#999;flex-wrap:wrap;gap:0.5rem;}
.visitor-counter{display:flex;align-items:center;gap:0.5rem;}
.visitor-count{display:inline-flex;align-items:center;gap:0.35rem;padding:0.25rem 0.6rem;border:1px solid var(–grid);border-radius:4px;background:rgba(255,255,255,0.03);}
.visitor-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;display:inline-block;animation:pulse 2s ease-in-out infinite;}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ─── HIGHLIGHT MATCH ─── */
mark{background:rgba(245,158,11,0.3);color:inherit;border-radius:2px;padding:0 1px;}
[data-theme=“light”] mark{background:rgba(26,58,92,0.15);}

/* ─── RESPONSIVE ─── */
@media(max-width:768px){
nav{padding:0.85rem 1rem;gap:0.6rem;}
.nav-center{max-width:none;}
.search-kbd{display:none;}
.nav-links{display:none;}
footer{padding:1rem 1.2rem;flex-direction:column;text-align:center;}
}
@media(max-width:480px){
.chat-wrapper{padding:5rem 1rem 1.5rem;}
.options{grid-template-columns:1fr;}
.opt-card{padding:1.3rem;}
}
</style>

/* ═══════════════════════════════════════
   SEARCH ENGINE
   ═══════════════════════════════════════ */
const searchInput  = document.getElementById('searchInput');
const searchClear  = document.getElementById('searchClear');
const dropdown     = document.getElementById('searchDropdown');
const overlay      = document.getElementById('searchOverlay');
let activeIdx = -1;
let currentResults = [];

function tokenize(str){ return str.toLowerCase().replace(/[^a-z0-9 ]/g,' ').split(/\s+/).filter(Boolean); }

function score(item, tokens){
  const haystack = (item.title + ' ' + item.meta + ' ' + item.keywords + ' ' + item.category).toLowerCase();
  let s = 0;
  for(const t of tokens){
    if(item.title.toLowerCase().includes(t)) s += 3;
    else if(haystack.includes(t)) s += 1;
  }
  return s;
}

function highlight(text, tokens){
  let out = text;
  for(const t of tokens){
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    out = out.replace(re, '<mark>$1</mark>');
  }
  return out;
}

function tagClass(tag){ return 'tag-'+tag; }

function renderResults(results, tokens){
  if(results.length === 0){
    dropdown.innerHTML = `<div class="search-empty"><span>🔍</span>No results found. Try a different keyword.</div>`;
    openDropdown();
    return;
  }

  // Group by category
  const groups = {};
  for(const r of results){
    if(!groups[r.category]) groups[r.category] = [];
    groups[r.category].push(r);
  }

  let html = '';
  let idx = 0;
  for(const [cat, items] of Object.entries(groups)){
    html += `<div class="search-section-label">${cat}</div>`;
    for(const item of items){
      html += `<a class="search-result" href="${item.href}" role="option" data-idx="${idx}">
        <span class="search-result-icon">${item.icon}</span>
        <span class="search-result-content">
          <span class="search-result-title">${highlight(item.title, tokens)}</span>
          <span class="search-result-meta">${item.meta}</span>
        </span>
        <span class="search-result-tag ${tagClass(item.tag)}">${item.tag}</span>
      </a>`;
      idx++;
    }
  }
  dropdown.innerHTML = html;
  currentResults = dropdown.querySelectorAll('.search-result');
  openDropdown();
}

function openDropdown(){ dropdown.classList.add('open'); overlay.classList.add('open'); }
function closeDropdown(){ dropdown.classList.remove('open'); overlay.classList.remove('open'); activeIdx = -1; }

function setActive(i){
  currentResults.forEach((r,j)=>r.classList.toggle('active', j===i));
  if(currentResults[i]) currentResults[i].scrollIntoView({block:'nearest'});
  activeIdx = i;
}

function runSearch(q){
  const tokens = tokenize(q);
  if(tokens.length === 0){ closeDropdown(); return; }
  const scored = SEARCH_INDEX.map(item=>({item, s:score(item,tokens)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.item);
  renderResults(scored.slice(0,12), tokens);
}

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim();
  searchClear.classList.toggle('visible', q.length > 0);
  if(q.length < 1){ closeDropdown(); return; }
  runSearch(q);
});

searchInput.addEventListener('keydown', e=>{
  if(!dropdown.classList.contains('open')) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); setActive(Math.min(activeIdx+1, currentResults.length-1)); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); setActive(Math.max(activeIdx-1, 0)); }
  else if(e.key==='Enter'){
    if(activeIdx>=0 && currentResults[activeIdx]){ currentResults[activeIdx].click(); }
    else if(currentResults.length > 0){ currentResults[0].click(); }
  }
  else if(e.key==='Escape'){ closeDropdown(); searchInput.blur(); }
});

searchClear.addEventListener('click', ()=>{
  searchInput.value='';
  searchClear.classList.remove('visible');
  closeDropdown();
  searchInput.focus();
});

overlay.addEventListener('click', ()=>{ closeDropdown(); });

// Press "/" to focus search
document.addEventListener('keydown', e=>{
  if(e.key==='/' && document.activeElement !== searchInput && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA'){
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});

function addBot(html, delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const ti = chat.querySelector('.typing-wrap');
    if (ti) ti.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="msg-avatar">&#8721;</div><div class="msg-body">${html}</div>`;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

function showTyping(delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'msg bot typing-wrap';
    div.innerHTML = `<div class="msg-avatar">&#8721;</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

function addOptions(cards, delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'options';
    div.innerHTML = cards.map(c => `
      <a href="${c.href}" class="opt-card" ${c.onclick ? `onclick="${c.onclick}"` : ''}>
        ${c.badge ? `<span class="opt-badge ${c.badgeClass || ''}">${c.badge}</span>` : ''}
        <div class="opt-icon">${c.icon}</div>
        <div class="opt-title">${c.title}</div>
        <div class="opt-desc">${c.desc}</div>
      </a>
    `).join('');
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}
