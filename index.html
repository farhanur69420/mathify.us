<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathify — Learn Math, Physics & Civil Engineering</title>
<meta name="description" content="Your personal learning assistant for Math, Physics, and Civil Engineering. Interactive guides, simulations, and step-by-step solutions.">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ─── THEME TOKENS ─── */
[data-theme="light"] {
  --ink: #0d0d0d;
  --paper: #f5f0e8;
  --paper2: #ffffff;
  --steel: #2c3e50;
  --rust: #c0392b;
  --blueprint: #1a3a5c;
  --grid: #d4cfc4;
  --accent: #e67e22;
  --nav-bg: rgba(245,240,232,0.93);
  --card-bg: #ffffff;
  --card-border: #d4cfc4;
  --toggle-bg: #1a3a5c;
  --toggle-icon: #f5f0e8;
  --chat-user: #e8f0fe;
  --chat-bot: #ffffff;
  --chat-bot-border: #d4cfc4;
  --text-muted: #666;
}
[data-theme="dark"] {
  --ink: #e2e8f0;
  --paper: #0d1117;
  --paper2: #161b22;
  --steel: #94a3b8;
  --rust: #f87171;
  --blueprint: #60a5fa;
  --grid: #1e293b;
  --accent: #f59e0b;
  --nav-bg: rgba(13,17,23,0.93);
  --card-bg: #161b22;
  --card-border: #1e293b;
  --toggle-bg: #f59e0b;
  --toggle-icon: #0d1117;
  --chat-user: #1e293b;
  --chat-bot: #161b22;
  --chat-bot-border: #1e293b;
  --text-muted: #64748b;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--paper);color:var(--ink);font-family:'DM Sans',sans-serif;overflow-x:hidden;transition:background 0.3s,color 0.3s;min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,58,92,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,58,92,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
[data-theme="dark"] body::before{background-image:linear-gradient(rgba(96,165,250,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,0.04) 1px,transparent 1px);}

/* ─── NAV ─── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:0.85rem 2.5rem;background:var(--nav-bg);backdrop-filter:blur(8px);border-bottom:1px solid var(--grid);transition:background 0.3s;}
.nav-logo{font-family:'Space Mono',monospace;font-size:0.85rem;letter-spacing:0.1em;color:var(--blueprint);text-transform:uppercase;text-decoration:none;}
.nav-right{display:flex;align-items:center;gap:0.6rem;}
.theme-toggle{width:36px;height:36px;border-radius:50%;background:var(--toggle-bg);border:none;color:var(--toggle-icon);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:background 0.3s,transform 0.2s;}
.theme-toggle:hover{transform:rotate(20deg) scale(1.1);}
.nav-links{display:flex;gap:1.2rem;list-style:none;align-items:center;}
.nav-links a{font-family:'Space Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--steel);text-decoration:none;transition:color 0.2s;}
.nav-links a:hover{color:var(--rust);}

/* ─── CHAT CONTAINER ─── */
.chat-wrapper{flex:1;display:flex;flex-direction:column;max-width:800px;width:100%;margin:0 auto;padding:5.5rem 1.5rem 2rem;position:relative;z-index:1;}
.chat-messages{flex:1;display:flex;flex-direction:column;gap:1.2rem;padding-bottom:2rem;}

/* ─── CHAT BUBBLES ─── */
.msg{display:flex;gap:0.8rem;align-items:flex-start;animation:fadeUp 0.4s ease forwards;opacity:0;}
.msg.bot{flex-direction:row;}
.msg.user{flex-direction:row-reverse;}
.msg-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
.msg.bot .msg-avatar{background:var(--blueprint);color:#fff;}
.msg.user .msg-avatar{background:var(--accent);color:#fff;}
.msg-body{max-width:85%;padding:1rem 1.3rem;border-radius:16px;line-height:1.7;font-size:0.95rem;}
.msg.bot .msg-body{background:var(--chat-bot);border:1px solid var(--chat-bot-border);border-top-left-radius:4px;color:var(--ink);}
.msg.user .msg-body{background:var(--blueprint);color:#fff;border-top-right-radius:4px;}

/* ─── OPTION CARDS ─── */
.options{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-top:0.5rem;animation:fadeUp 0.5s ease forwards;opacity:0;animation-delay:0.2s;}
.opt-card{position:relative;display:flex;flex-direction:column;padding:1.8rem;border:2px solid var(--card-border);border-radius:12px;background:var(--card-bg);cursor:pointer;transition:all 0.25s;text-decoration:none;color:var(--ink);overflow:hidden;}
.opt-card:hover{border-color:var(--blueprint);transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,0.12);}
[data-theme="dark"] .opt-card:hover{box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.opt-icon{font-size:2.2rem;margin-bottom:0.8rem;}
.opt-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--blueprint);margin-bottom:0.4rem;}
.opt-desc{font-size:0.85rem;color:var(--text-muted);line-height:1.6;}
.opt-badge{position:absolute;top:12px;right:12px;font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:0.1em;padding:2px 8px;border-radius:3px;text-transform:uppercase;font-weight:700;}
.opt-badge.live{background:#16a34a;color:#fff;}
.opt-badge.soon{background:var(--accent);color:#fff;}
.opt-badge.new{background:var(--rust);color:#fff;}

/* ─── TYPING INDICATOR ─── */
.typing{display:flex;gap:4px;padding:0.8rem 1.2rem;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--steel);animation:typingBounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}

/* ─── FOOTER ─── */
footer{position:relative;z-index:1;padding:1.5rem 2.5rem;border-top:1px solid var(--grid);display:flex;justify-content:space-between;align-items:center;font-family:'Space Mono',monospace;font-size:0.68rem;letter-spacing:0.05em;color:#999;flex-wrap:wrap;gap:0.5rem;}
.visitor-counter{display:flex;align-items:center;gap:0.5rem;}
.visitor-count{display:inline-flex;align-items:center;gap:0.35rem;padding:0.25rem 0.6rem;border:1px solid var(--grid);border-radius:4px;background:rgba(255,255,255,0.03);}
.visitor-dot{width:6px;height:6px;border-radius:50%;background:#4caf50;display:inline-block;animation:pulse 2s ease-in-out infinite;}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* ─── RESPONSIVE ─── */
@media(max-width:600px){
  nav{padding:0.85rem 1.2rem;}
  .chat-wrapper{padding:5rem 1rem 1.5rem;}
  .options{grid-template-columns:1fr;}
  .opt-card{padding:1.3rem;}
  footer{padding:1rem 1.2rem;flex-direction:column;text-align:center;}
  .nav-links{display:none;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Mathify</a>
  <div style="display:flex;align-items:center;gap:1.5rem;">
    <ul class="nav-links">
      <li><a href="about.html">About</a></li>
      <li><a href="status.html">Status</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">&#9728;&#65039;</button>
    </div>
  </div>
</nav>

<div class="chat-wrapper">
  <div class="chat-messages" id="chat"></div>
</div>

<footer>
  <span>Mathify &mdash; mathify.us</span>
  <span class="visitor-counter"><span class="visitor-count"><span class="visitor-dot"></span><span id="visitorCount">0</span></span> visits</span>
  <span>Free for students everywhere</span>
</footer>

<script>
const chat = document.getElementById('chat');
let msgDelay = 0;

function addBot(html, delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    // Remove any typing indicator
    const ti = chat.querySelector('.typing-wrap');
    if (ti) ti.remove();
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = `<div class="msg-avatar">&#8721;</div><div class="msg-body">${html}</div>`;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

function addUser(text, delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-avatar">You</div><div class="msg-body">${text}</div>`;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

function showTyping(delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'msg bot typing-wrap';
    div.innerHTML = `<div class="msg-avatar">&#8721;</div><div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

function addOptions(cards, delay) {
  delay = delay || msgDelay;
  setTimeout(() => {
    const div = document.createElement('div');
    div.className = 'options';
    div.innerHTML = cards.map(c => `
      <a href="${c.href}" class="opt-card" ${c.onclick ? `onclick="${c.onclick}"` : ''}>
        ${c.badge ? `<span class="opt-badge ${c.badgeClass || ''}">${c.badge}</span>` : ''}
        <div class="opt-icon">${c.icon}</div>
        <div class="opt-title">${c.title}</div>
        <div class="opt-desc">${c.desc}</div>
      </a>
    `).join('');
    chat.appendChild(div);
    div.scrollIntoView({ behavior: 'smooth', block: 'end' });
  }, delay);
  msgDelay = delay + 100;
}

// ─── START CONVERSATION ───
addBot("Hey there! Welcome to <strong>Mathify</strong> &#128075;", 300);
showTyping(1200);
addBot("I'm your learning assistant. I can help you with <strong>Math</strong>, <strong>Physics</strong>, and <strong>Civil Engineering</strong>.", 2000);
showTyping(2800);
addBot("What would you like to learn today?", 3500);
addOptions([
  {
    icon: '&#128202;',
    title: 'Mathematics',
    desc: 'Complete guides for Class 9 through 12. Step-by-step problems, visual explanations, and interactive simulations.',
    href: 'math.html',
    badge: 'LIVE',
    badgeClass: 'live'
  },
  {
    icon: '&#9883;',
    title: 'Physics',
    desc: 'Mechanics, thermodynamics, waves, optics, and modern physics. Visual and intuitive.',
    href: 'physics.html',
    badge: 'COMING SOON',
    badgeClass: 'soon'
  },
  {
    icon: '&#127959;',
    title: 'Civil Engineering',
    desc: 'RC Design & Traffic Engineering. Focused lectures with simulations, videos, and practice problems.',
    href: 'civil.html',
    badge: 'LIVE',
    badgeClass: 'live'
  }
], 4200);

/* ─── DARK / LIGHT MODE ─── */
const toggleBtn = document.getElementById('themeToggle');
const root = document.documentElement;
function setTheme(t) {
  root.setAttribute('data-theme', t);
  toggleBtn.textContent = t === 'dark' ? '\u2600\uFE0F' : '\uD83C\uDF19';
  localStorage.setItem('mathify-theme', t);
}
const saved = localStorage.getItem('mathify-theme');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
setTheme(saved || (prefersDark ? 'dark' : 'light'));
toggleBtn.addEventListener('click', () => {
  setTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

/* ─── VISITOR COUNTER ─── */
(function(){
  const el = document.getElementById('visitorCount');
  if (!el) return;
  fetch('https://visitor.6developer.com/visit', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      domain: 'mathify.us',
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      page_path: location.pathname,
      page_title: document.title,
      referrer: document.referrer
    })
  })
  .then(r => r.json())
  .then(data => {
    if (data && typeof data.totalCount === 'number') {
      el.textContent = data.totalCount.toLocaleString();
      localStorage.setItem('mathify-visit-count', data.totalCount);
    }
  })
  .catch(() => {
    const cached = localStorage.getItem('mathify-visit-count');
    if (cached) el.textContent = parseInt(cached).toLocaleString();
  });
})();
</script>
</body>
</html>
