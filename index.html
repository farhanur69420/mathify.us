<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mathify — Learn Math, Physics & Civil Engineering</title>
  <meta name="description" content="Chat with your learning guide. Explore Math, Physics, Civil Engineering, and more.">
  <style>
    /* ═══════════════════════════════════════════════════════════
       CLAUDE CHATBOT STYLE INTERFACE
       ═══════════════════════════════════════════════════════════ */

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ─── THEME TOKENS ─── */
    [data-theme="light"] {
      --bg-primary: #FFFFFF;
      --bg-secondary: #F5F5F5;
      --text-primary: #000000;
      --text-secondary: #565656;
      --border-color: #D1D5DB;
      --bot-bg: #F0F0F0;
      --user-bg: #E7F3FF;
      --user-text: #0066CC;
      --button-bg: #0066CC;
      --button-text: #FFFFFF;
      --button-hover: #0052A3;
      --input-bg: #FFFFFF;
      --input-border: #D1D5DB;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    [data-theme="dark"] {
      --bg-primary: #0D0D0D;
      --bg-secondary: #1A1A1A;
      --text-primary: #ECECEC;
      --text-secondary: #B0B0B0;
      --border-color: #3F3F3F;
      --bot-bg: #262626;
      --user-bg: #1E4976;
      --user-text: #A8D8FF;
      --button-bg: #0084FF;
      --button-text: #FFFFFF;
      --button-hover: #0066CC;
      --input-bg: #262626;
      --input-border: #3F3F3F;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    /* ─── LAYOUT ─── */
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .header-brand {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .theme-toggle {
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .theme-toggle:hover {
      background: var(--bg-secondary);
      border-color: var(--text-secondary);
    }

    /* ─── MAIN CHAT AREA ─── */
    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar {
      width: 8px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    .chat-messages::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* ─── MESSAGE BUBBLES ─── */
    .message-group {
      display: flex;
      gap: 0.75rem;
      animation: messageEnter 0.3s ease forwards;
    }

    @keyframes messageEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message-group.bot {
      justify-content: flex-start;
    }

    .message-group.user {
      justify-content: flex-end;
    }

    .message {
      max-width: 70%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .message {
        max-width: 85%;
      }
    }

    .message-group.bot .message {
      background: var(--bot-bg);
      color: var(--text-primary);
      border-radius: 12px 12px 12px 4px;
    }

    .message-group.user .message {
      background: var(--user-bg);
      color: var(--user-text);
      border-radius: 12px 12px 4px 12px;
    }

    .message a {
      color: var(--button-bg);
      text-decoration: none;
      font-weight: 500;
    }

    .message a:hover {
      text-decoration: underline;
    }

    /* ─── BUTTONS (CONTEXTUAL) ─── */
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .action-btn {
      padding: 0.6rem 1rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background-color 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: var(--button-hover);
      transform: translateY(-1px);
    }

    .action-btn:active {
      transform: translateY(0);
    }

    /* Navigation action buttons (different style) */
    .nav-btn {
      background: var(--button-bg);
      color: var(--button-text);
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      transition: background-color 0.2s;
    }

    .nav-btn:hover {
      background: var(--button-hover);
    }

    .nav-btn:active {
      opacity: 0.8;
    }

    /* ─── USER MESSAGE DISPLAY ─── */
    .user-action-button {
      display: inline-block;
      background: rgba(0, 102, 204, 0.15);
      color: var(--user-text);
      padding: 0.5rem 0.8rem;
      border-radius: 16px;
      font-size: 13px;
      border: 1px solid var(--user-bg);
    }

    /* ─── INPUT AREA ─── */
    .input-area {
      padding: 1rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 0.5rem;
      max-width: 100%;
    }

    .input-field {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field::placeholder {
      color: var(--text-secondary);
    }

    .input-field:focus {
      border-color: var(--button-bg);
    }

    .send-btn {
      padding: 0.75rem 1.5rem;
      background: var(--button-bg);
      color: var(--button-text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .send-btn:hover {
      background: var(--button-hover);
    }

    .send-btn:active {
      opacity: 0.8;
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─── FOOTER ─── */
    .footer {
      padding: 0.75rem 1rem;
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      border-top: 1px solid var(--border-color);
      background: var(--bg-secondary);
    }

    .footer a {
      color: var(--button-bg);
      text-decoration: none;
      margin: 0 0.5rem;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    /* ─── TYPING INDICATOR ─── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      animation: typingAnimation 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingAnimation {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 768px) {
      .message {
        max-width: 85%;
      }

      .input-area {
        padding: 0.75rem;
      }

      .input-field, .send-btn {
        font-size: 16px; /* Prevents iOS zoom on focus */
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <div class="header-brand">🎓 Mathify</div>
      <div class="header-controls">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">☀️</button>
      </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-wrapper">
      <div class="chat-messages" id="chatMessages"></div>
    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
      <div class="input-wrapper">
        <input
          class="input-field"
          id="messageInput"
          type="text"
          placeholder="Type your message or click a button above..."
          autocomplete="off"
        >
        <button class="send-btn" id="sendBtn">Send</button>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div>
        <a href="about.html">About</a>
        <a href="status.html">Status</a>
      </div>
      <div style="margin-top: 0.5rem;">© 2024 Mathify Learning Platform</div>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════
       CLAUDE CHATBOT INTERFACE - CONVERSATION ENGINE
       ═══════════════════════════════════════════════════════════ */

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const themeToggle = document.getElementById('themeToggle');
    const root = document.documentElement;

    // ─── CONVERSATION STATE ─── //
    let messages = [];
    let conversationState = 'greeting';

    // ─── SECTION INFO ─── //
    const sections = {
      math: {
        name: 'Mathematics',
        emoji: '📊',
        description: 'Algebra, Calculus, Trigonometry, Statistics',
        url: 'math.html'
      },
      physics: {
        name: 'Physics',
        emoji: '⚛️',
        description: 'Mechanics, Waves, Optics, Electricity, Modern Physics',
        url: 'physics.html'
      },
      civil: {
        name: 'Civil Engineering',
        emoji: '🏗️',
        description: 'RC Design, Traffic Engineering',
        url: 'civil.html'
      },
      explore: {
        name: 'Explore',
        emoji: '🎵',
        description: 'Music & Study Vibes',
        url: 'explore.html'
      }
    };

    // ─── BOT RESPONSES ─── //
    const botResponses = {
      greeting: {
        text: "Hi! 👋 I'm here to help you learn. What interests you?",
        buttons: [
          { text: '📊 Mathematics', action: 'selectMath' },
          { text: '⚛️ Physics', action: 'selectPhysics' },
          { text: '🏗️ Civil Eng.', action: 'selectCivil' },
          { text: '🎵 Explore', action: 'selectExplore' },
          { text: 'Tell me more', action: 'moreInfo' }
        ]
      },
      moreInfo: {
        text: "Sure! Here's what we offer:\n\n📊 **Mathematics** - Algebra, Calculus, Trigonometry, Statistics\n⚛️ **Physics** - Mechanics, Waves, Optics, Electricity, Modern Physics\n🏗️ **Civil Engineering** - RC Design, Traffic Engineering\n🎵 **Explore** - Music & Study Vibes for Learning\n\nWhich one sounds good?",
        buttons: [
          { text: '📊 Math', action: 'selectMath' },
          { text: '⚛️ Physics', action: 'selectPhysics' },
          { text: '🏗️ Civil', action: 'selectCivil' },
          { text: '🎵 Music', action: 'selectExplore' }
        ]
      },
      selectMath: {
        text: "Great choice! 📊 Let's dive into Mathematics. Ready to explore topics like calculus, algebra, and more?",
        buttons: [
          { text: '✓ Let\'s go!', action: 'navMath', isNav: true },
          { text: 'Tell me more', action: 'moreMath' }
        ]
      },
      moreMath: {
        text: "We cover:\n• Algebra & Polynomials\n• Trigonometry & Heights/Distances\n• Coordinate Geometry\n• Calculus (Limits, Derivatives, Integration)\n• Statistics & Probability\n• Matrices & Vectors\n\nReady to get started?",
        buttons: [
          { text: '✓ Start now', action: 'navMath', isNav: true },
          { text: 'Back', action: 'greeting' }
        ]
      },
      selectPhysics: {
        text: "Excellent! ⚛️ Physics is all about understanding how the universe works. Ready to explore?",
        buttons: [
          { text: '✓ Let\'s go!', action: 'navPhysics', isNav: true },
          { text: 'Tell me more', action: 'morePhysics' }
        ]
      },
      morePhysics: {
        text: "We cover:\n• Kinematics & Projectile Motion\n• Newton's Laws & Forces\n• Work, Energy & Power\n• Rotational Motion\n• Gravitation & Satellites\n• Waves & Oscillations\n• Electromagnetism\n• Optics & Modern Physics\n\nExcited to learn?",
        buttons: [
          { text: '✓ Start now', action: 'navPhysics', isNav: true },
          { text: 'Back', action: 'greeting' }
        ]
      },
      selectCivil: {
        text: "Perfect! 🏗️ Civil Engineering covers structural design and infrastructure. Let's dive in!",
        buttons: [
          { text: '✓ Let\'s go!', action: 'navCivil', isNav: true },
          { text: 'Tell me more', action: 'moreCivil' }
        ]
      },
      moreCivil: {
        text: "We focus on:\n• Reinforced Concrete Design\n• Beam & Column Design\n• Shear & Torsion\n• Traffic Engineering\n• Structural Analysis\n• Foundation Design\n\nReady to explore structures?",
        buttons: [
          { text: '✓ Start now', action: 'navCivil', isNav: true },
          { text: 'Back', action: 'greeting' }
        ]
      },
      selectExplore: {
        text: "Nice! 🎵 Let's explore music and study vibes. Perfect for keeping focused while learning!",
        buttons: [
          { text: '✓ Let\'s go!', action: 'navExplore', isNav: true },
          { text: 'Tell me more', action: 'moreExplore' }
        ]
      },
      moreExplore: {
        text: "Explore features:\n• Techno & Ambient Music\n• R&B & Chill Beats\n• Lo-Fi Hip-Hop\n• Study Playlists\n• Focus & Concentration Tracks\n\nReady to set the mood?",
        buttons: [
          { text: '✓ Let\'s go!', action: 'navExplore', isNav: true },
          { text: 'Back', action: 'greeting' }
        ]
      }
    };

    // ─── NAVIGATION ACTIONS ─── //
    function navigateToSection(sectionKey) {
      const section = sections[sectionKey];
      if (section) {
        setTimeout(() => {
          window.location.href = section.url;
        }, 300);
      }
    }

    // ─── MESSAGE RENDERING ─── //
    function addMessage(role, content, buttons = null) {
      const messageGroup = document.createElement('div');
      messageGroup.className = `message-group ${role}`;

      if (role === 'bot') {
        const botAvatar = document.createElement('div');
        botAvatar.style.fontSize = '1.2rem';
        botAvatar.textContent = '🤖';
        messageGroup.appendChild(botAvatar);
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = 'message';
      messageDiv.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

      messageGroup.appendChild(messageDiv);

      if (buttons && buttons.length > 0) {
        const buttonGroup = document.createElement('div');
        buttonGroup.className = 'button-group';

        buttons.forEach(btn => {
          const button = document.createElement('button');
          button.className = 'action-btn';
          button.textContent = btn.text;
          button.onclick = () => handleButtonClick(btn.action, btn.text, btn.isNav);
          buttonGroup.appendChild(button);
        });

        messageGroup.appendChild(buttonGroup);
      }

      chatMessages.appendChild(messageGroup);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addUserMessage(text) {
      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group user';

      const messageDiv = document.createElement('div');
      messageDiv.className = 'message';
      messageDiv.textContent = text;

      messageGroup.appendChild(messageDiv);
      chatMessages.appendChild(messageGroup);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function addTypingIndicator() {
      const messageGroup = document.createElement('div');
      messageGroup.className = 'message-group bot';
      messageGroup.id = 'typingIndicator';

      const botAvatar = document.createElement('div');
      botAvatar.style.fontSize = '1.2rem';
      botAvatar.textContent = '🤖';
      messageGroup.appendChild(botAvatar);

      const messageDiv = document.createElement('div');
      messageDiv.className = 'message';
      messageDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';

      messageGroup.appendChild(messageDiv);
      chatMessages.appendChild(messageGroup);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTypingIndicator() {
      const typingIndicator = document.getElementById('typingIndicator');
      if (typingIndicator) {
        typingIndicator.remove();
      }
    }

    // ─── BUTTON HANDLER ─── //
    function handleButtonClick(action, displayText, isNav = false) {
      // Add user message
      addUserMessage(displayText);
      messageInput.value = '';

      // Navigation actions
      if (action === 'navMath') {
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          addMessage('bot', "Perfect! You're ready to explore Mathematics. 🚀");
          navigateToSection('math');
        }, 800);
        return;
      } else if (action === 'navPhysics') {
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          addMessage('bot', "Awesome! Let's dive into Physics. 🚀");
          navigateToSection('physics');
        }, 800);
        return;
      } else if (action === 'navCivil') {
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          addMessage('bot', "Great! Welcome to Civil Engineering. 🚀");
          navigateToSection('civil');
        }, 800);
        return;
      } else if (action === 'navExplore') {
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          addMessage('bot', "Let's get you some great study vibes! 🚀");
          navigateToSection('explore');
        }, 800);
        return;
      }

      // Conversation actions
      const response = botResponses[action];
      if (response) {
        conversationState = action;
        addTypingIndicator();
        setTimeout(() => {
          removeTypingIndicator();
          addMessage('bot', response.text, response.buttons);
        }, 600);
      }
    }

    // ─── NATURAL LANGUAGE PROCESSING ─── //
    function processUserInput(text) {
      const lower = text.toLowerCase();

      // Direct section mentions
      if (lower.includes('math') || lower.includes('algebra') || lower.includes('calculus') || lower.includes('trigonometry')) {
        return 'selectMath';
      }
      if (lower.includes('physics') || lower.includes('mechanics') || lower.includes('wave') || lower.includes('optics')) {
        return 'selectPhysics';
      }
      if (lower.includes('civil') || lower.includes('engineering') || lower.includes('rc design') || lower.includes('traffic')) {
        return 'selectCivil';
      }
      if (lower.includes('explore') || lower.includes('music') || lower.includes('vibe') || lower.includes('study beat')) {
        return 'selectExplore';
      }

      // More info
      if (lower.includes('more') || lower.includes('what') || lower.includes('tell') || lower.includes('help')) {
        return 'moreInfo';
      }

      // Default
      return null;
    }

    // ─── SEND MESSAGE ─── //
    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      addUserMessage(text);
      messageInput.value = '';

      addTypingIndicator();
      setTimeout(() => {
        removeTypingIndicator();

        const action = processUserInput(text);
        if (action) {
          const response = botResponses[action];
          if (response) {
            conversationState = action;
            addMessage('bot', response.text, response.buttons);
          }
        } else {
          // Default response for unrecognized input
          addMessage('bot', "I'm not sure I understand. Let me help you find what you're looking for! What would you like to explore?", botResponses.greeting.buttons);
        }
      }, 600);
    }

    // ─── EVENT LISTENERS ─── //
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // ─── THEME TOGGLE ─── //
    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      themeToggle.textContent = theme === 'dark' ? '🌙' : '☀️';
      localStorage.setItem('mathify-theme', theme);
    }

    const savedTheme = localStorage.getItem('mathify-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    setTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

    themeToggle.addEventListener('click', () => {
      const current = root.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // ─── INITIAL MESSAGE ─── //
    window.addEventListener('load', () => {
      setTimeout(() => {
        const response = botResponses.greeting;
        addMessage('bot', response.text, response.buttons);
      }, 300);
    });

    // ─── VISITOR COUNTER (Background) ─── //
    (function() {
      fetch('https://visitor.6developer.com/visit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          domain: 'mathify.us',
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          page_path: location.pathname,
          page_title: document.title,
          referrer: document.referrer
        })
      }).catch(() => {});
    })();
  </script>
</body>
</html>
